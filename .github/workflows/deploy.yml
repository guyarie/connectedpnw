name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    # Runs on the self-hosted runner on holdens-box (home server).
    # The build uses the box's RAM and publishes straight to the Nginx web root
    # on the same machine — no SSH/rsync-over-network, no deploy secrets.
    runs-on: [self-hosted, holdens]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Publish dist to Nginx web root
        run: rsync -a --delete dist/ /var/www/connectedpnw/dist/
